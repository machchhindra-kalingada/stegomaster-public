<svg width="700" viewBox="0 0 680 460" role="img" xmlns="http://www.w3.org/2000/svg">
<title>StegoMaster — Conceptual Architecture (non-technical)</title>
<desc>High-level concept diagram: Your Secret + Password → Encrypt → Embed into Carrier → Output (looks normal). Then: Stego File + Password → Decrypt → Recovered Secret.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="460" fill="#fff" rx="0"/>

<!-- Title -->
<text x="340" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#111">StegoMaster — How It Works</text>

<!-- ===== SECTION LABEL: HIDING ===== -->
<text x="30" y="68" font-family="system-ui,sans-serif" font-size="11" fill="#888" font-weight="500">HIDING</text>
<line x1="90" y1="64" x2="650" y2="64" stroke="#eee" stroke-width="1"/>

<!-- Your Secret -->
<rect x="30" y="80" width="120" height="56" rx="8" fill="#f0edfc" stroke="#a89de8" stroke-width="1"/>
<text x="90" y="104" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#4a3fb5">Your Secret</text>
<text x="90" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#7768cc">Text or any file</text>

<!-- Password (top) -->
<rect x="30" y="156" width="120" height="44" rx="8" fill="#fef9ec" stroke="#d4a855" stroke-width="1"/>
<text x="90" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#8a6320">Password</text>

<!-- Arrows to Encrypt -->
<path d="M150 108 L190 148" class="arrow" fill="none" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
<path d="M150 178 L190 168" class="arrow" fill="none" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Encrypt -->
<rect x="192" y="138" width="120" height="56" rx="8" fill="#e8f7f1" stroke="#2e9e70" stroke-width="1"/>
<text x="252" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1a6646">Encrypt</text>
<text x="252" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2e9e70">Military-grade</text>

<!-- Carrier file -->
<rect x="354" y="80" width="120" height="44" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="1"/>
<text x="414" y="106" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#444">Carrier File</text>

<!-- Arrow carrier to embed -->
<path d="M414 124 L414 138" fill="none" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Arrow encrypt to embed -->
<path d="M312 166 L352 166" fill="none" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Embed -->
<rect x="354" y="138" width="120" height="56" rx="8" fill="#e8f7f1" stroke="#2e9e70" stroke-width="1"/>
<text x="414" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1a6646">Embed</text>
<text x="414" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2e9e70">Invisibly hidden</text>

<!-- Arrow to output -->
<path d="M474 166 L514 166" fill="none" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Output -->
<rect x="516" y="138" width="134" height="56" rx="8" fill="#eafaf2" stroke="#2e9e70" stroke-width="1.5"/>
<text x="583" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1a6646">Output File</text>
<text x="583" y="176" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2e9e70">Looks completely normal</text>
<text x="583" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#2e9e70">✓ Passes steganalysis</text>

<!-- ===== DIVIDER ===== -->
<line x1="30" y1="230" x2="650" y2="230" stroke="#eee" stroke-width="1" stroke-dasharray="6 4"/>
<text x="340" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#aaa">— Share the output file anywhere —</text>

<!-- ===== SECTION LABEL: REVEALING ===== -->
<text x="30" y="278" font-family="system-ui,sans-serif" font-size="11" fill="#888" font-weight="500">REVEALING</text>
<line x1="110" y1="274" x2="650" y2="274" stroke="#eee" stroke-width="1"/>

<!-- Stego file received -->
<rect x="30" y="290" width="120" height="56" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="1"/>
<text x="90" y="314" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#444">Stego File</text>
<text x="90" y="332" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#888">Received carrier</text>

<!-- Password bottom -->
<rect x="30" y="366" width="120" height="44" rx="8" fill="#fef9ec" stroke="#d4a855" stroke-width="1"/>
<text x="90" y="392" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#8a6320">Password</text>

<!-- Arrows to Decrypt -->
<path d="M150 318 L190 338" fill="none" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
<path d="M150 388 L190 358" fill="none" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Decrypt -->
<rect x="192" y="318" width="120" height="56" rx="8" fill="#e8f7f1" stroke="#2e9e70" stroke-width="1"/>
<text x="252" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1a6646">Decrypt</text>
<text x="252" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2e9e70">Verify &amp; decode</text>

<!-- Arrow to recovered -->
<path d="M312 346 L352 346" fill="none" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Recovered -->
<rect x="354" y="318" width="296" height="56" rx="8" fill="#f0edfc" stroke="#a89de8" stroke-width="1.5"/>
<text x="502" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#4a3fb5">Recovered Secret</text>
<text x="502" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#7768cc">Exactly as you hid it — text or file</text>

<!-- Footer note -->
<text x="340" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#bbb">Password never stored or transmitted · Files auto-deleted after download · Zero knowledge</text>
</svg>
